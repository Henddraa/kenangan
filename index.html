<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Kenangan - Masuk</title>
    <link rel="stylesheet" href="style/cssindex.css/style.css">
</head>
<body>
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>
    <div class="login-card">
        <div class="heart">❤️</div>
        <h2>Website Kenangan</h2>
        <p>Masukkan PIN dulu ya sayang 😘</p>

        <div class="input-group">
            <input type="password" id="pinInput" placeholder="******" maxlength="6" inputmode="numeric" pattern="\d*">
        </div>

        <button onclick="cekPIN()">Masuk</button>

        <div id="errorMessage">MASA GA INGET SIHHH 😡</div>
        <div class="hint">ulang tahun kamu atau akuuu</div>
    </div>

    <script>
        const PIN_VALID = ["290608", "101108"]; 

        function cekPIN() {
            const input = document.getElementById('pinInput').value.trim();
            const errorDiv = document.getElementById('errorMessage');

            if (PIN_VALID.includes(input)) {
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'love.html';
            } else {
                errorDiv.style.display = 'block';
                document.getElementById('pinInput').value = '';
                document.getElementById('pinInput').focus();
            }
        }

        window.onload = function() {
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                window.location.href = 'love.html';
            }
        };

        document.getElementById('pinInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                cekPIN();
            }
        });

        // Batasi input hanya angka
        document.getElementById('pinInput').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
        });

        // Handle musik autoplay after DOM siap
        function initMusic() {
            const audio = document.querySelector('audio');
            if (!audio) return; // safety

            function playMusic() {
                audio.play().catch(e => {
                    console.log('Autoplay diblokir oleh browser, musik akan diputar saat interaksi pertama');
                });
            }

            playMusic();
            // Jika autoplay gagal, putar saat klik pertama
            document.addEventListener('click', () => {
                audio.play();
            }, { once: true });
        }
        window.addEventListener('load', initMusic);
    </script>
    <audio loop hidden>
        <source src="musik.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
